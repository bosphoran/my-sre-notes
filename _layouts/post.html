---
layout: dashboard
---
<article class="post-content">
  <header class="post-header" style="margin-bottom: 30px;">
    <h1 style="color: var(--accent-color); display: inline-block; margin: 0;">
      # {{ page.title }}
    </h1>
    
    {% if page.categories.size > 0 %}
      <span class="post-category-tag" style="font-size: 0.9rem;">
        {{ page.categories | first }}
      </span>
    {% endif %}

    <div style="font-size: 0.8rem; color: #8b949e; margin-top: 10px;">
      IDENTIFIER: {{ page.date | date: "%d-%b-%Y" | upcase }}
    </div>
  </header>

  <div class="entry-content">
    {{ content }}
  </div>
</article>
